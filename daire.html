<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Daire Alanı Hesapla</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daire Alanı</h2>
    <input type="number" id="yaricap" placeholder="Yarıçap (r)">
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc" style="margin-top:15px;"></div>
</div>

<script>
    function hesapla() {
        const r = parseFloat(document.getElementById('yaricap').value);
        if (r > 0) {
            const alan = Math.PI * Math.pow(r, 2);
            document.getElementById('sonuc').innerText = "Alan: " + alan.toFixed(2);
        }
    }
</script>
</body>
</html>
