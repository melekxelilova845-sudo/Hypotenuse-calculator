<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Hipotenüs Hesaplayıcı</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #f3f4f6;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .container { 
            background: white;
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 { color: #1f2937; margin-bottom: 1.5rem; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #e5e7eb; 
            border-radius: 10px; 
            box-sizing: border-box; /* Padding'in genişliği bozmaması için */
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary-color); }
        button { 
            width: 100%;
            padding: 12px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: transform 0.1s, background 0.3s;
        }
        button:hover { background-color: #4f46e5; }
        button:active { transform: scale(0.98); }
        #sonuc { 
            margin-top: 20px; 
            font-size: 1.2rem; 
            color: #374151;
            padding: 10px;
            background: #f9fafb;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hipotenüs Hesapla</h2>
    <input type="number" id="kenar1" placeholder="1. Dik Kenar">
    <input type="number" id="kenar2" placeholder="2. Dik Kenar">
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc">Sonuç burada görünecek</div>
</div>

<script>
    function hesapla() {
        const a = parseFloat(document.getElementById('kenar1').value);
        const b = parseFloat(document.getElementById('kenar2').value);
        const sonucDiv = document.getElementById('sonuc');
        
        if (!isNaN(a) && !isNaN(b) && a > 0 && b > 0) {
            const c = Math.sqrt(Math.pow(a, 2) + Math.pow(b, 2));
            sonucDiv.innerHTML = "<strong>Hipotenüs:</strong> " + c.toFixed(2);
        } else {
            sonucDiv.innerHTML = "<span style='color:red;'>Lütfen geçerli sayılar girin!</span>";
        }
    }
</script>

</body>
</html>
