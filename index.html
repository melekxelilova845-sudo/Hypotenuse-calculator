<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hipotenüs Hesaplayıcı</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        #sonuc { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hipotenüs Hesapla</h2>
    <input type="number" id="kenar1" placeholder="1. Dik Kenar">
    <input type="number" id="kenar2" placeholder="2. Dik Kenar">
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc"></div>
</div>

<script>
    function hesapla() {
        const a = parseFloat(document.getElementById('kenar1').value);
        const b = parseFloat(document.getElementById('kenar2').value);
        
        if (a > 0 && b > 0) {
            // Pisagor teoremi: c = sqrt(a^2 + b^2)
            const c = Math.sqrt(Math.pow(a, 2) + Math.pow(b, 2));
            document.getElementById('sonuc').innerText = "Hipotenüs: " + c.toFixed(2);
        } else {
            document.getElementById('sonuc').innerText = "Lütfen geçerli sayılar girin!";
        }
    }
</script>

</body>
</html>
