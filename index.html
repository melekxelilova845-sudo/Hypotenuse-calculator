<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipotenüs Hesaplayıcı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Arka plan görselini ekliyoruz */
            background: url('https://i.imgur.com/8uQ4H45.png') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            /* Cam efekti (Glassmorphism) */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 320px;
            text-align: center;
            color: white;
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #6366f1; }

        #sonuc {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hipotenüs</h2>
    <input type="number" id="kenar1" placeholder="1. Dik Kenar">
    <input type="number" id="kenar2" placeholder="2. Dik Kenar">
    <button onclick="hesapla()">Hesapla</button>
    <div id="sonuc">Sonuç burada görünecek</div>
</div>

<script>
    function hesapla() {
        const a = parseFloat(document.getElementById('kenar1').value);
        const b = parseFloat(document.getElementById('kenar2').value);
        const sonucDiv = document.getElementById('sonuc');
        
        if (!isNaN(a) && !isNaN(b) && a > 0 && b > 0) {
            const c = Math.sqrt(Math.pow(a, 2) + Math.pow(b, 2));
            sonucDiv.innerHTML = "<strong>Hipotenüs:</strong> " + c.toFixed(2);
        } else {
            sonucDiv.innerHTML = "Lütfen geçerli değerler girin.";
        }
    }
</script>

</body>
</html>
